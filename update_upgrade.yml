---
- name: Update and upgrade all packages
  hosts: all
  become: true
  tasks:
    - name: Update cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist  # Options: yes, safe, dist, or full
        cache_valid_time: 3600  # Only update if cache is older than 1 hour
      register: apt_result
    
    - name: Display installation messages
      ansible.builtin.debug:
        var: apt_result.msg

    - name: Remove unused dependencies
      ansible.builtin.apt:
        autoremove: yes
        autoclean: yes

    - name: Check if a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot the server if file exists
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after package updates"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: reboot_required_file.stat.exists
      
